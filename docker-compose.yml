services:
  mysql:
    image: mysql:8
    container_name: mysql-db-colegio
    restart: always
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colegio-api
    restart: always
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DB_URI: jdbc:mysql://mysql:3306/${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
    depends_on:
      mysql:
        condition: service_healthy